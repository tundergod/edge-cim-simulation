module: m2_memory
measurement_sources:
  - measurements/aetina/metis_alpha_matmul.json   # pcie_floor_A1d5 (911us / 1112 p95)
  - "voyager-sdk.md:278"                           # measured production-card LPDDR4x decode wall 24.2 GB/s
acceptance_criteria:
  - {type: sanity, rules: [transfer_positive, monotonic_in_bytes]}
  - {type: dram_eff_BW, rule: "measured 24.2 GB/s = 55-85% of the MEASURED memory's (LPDDR4x ~34 GB/s) peak"}
fixed_params:
  - {pcie_floor_us: 911.1, source: pcie_floor_A1d5, note: "discrete host<->device transfers only"}
  - {pcie_BW_GBs: 3.9, source: "documented Gen3x4 (voyager-sdk)"}
  - {measured_eff_BW_GBs: 24.2, memory: "LPDDR4x (production card)", lpddr4x_peak_GBs: 34.1, eff_pct: 0.71}
  - {sim_lpddr5_peak_GBs: 51.2, sim_lpddr5_eff_GBs: 33.3, note: "forward-looking SoC, different memory"}
efficiency_evidence: "HeteroInfer SOSP'25 Fig5 single-proc decode 40-45/68=59-66%; web 60-80% memory-bound"
decisions:
  - build_l1_l2_residency: "Phase 2 MUST build L1 (4 MiB/core) + L2 (32 MiB shared) residency
      (REVERSED the earlier no-build decision) — needed for architecture research once the
      memory-wall bottleneck is addressed. The Alpha l2/ddr ~1.00-1.01 'no effect' was only a
      topology artifact (Alpha has no on-card DRAM); the simulated SoC does, so the SRAM
      hierarchy is a load-bearing variable and must be modeled to real sizes."
  - sram_belongs_to_m1_spm: "Phase 1.2 — the L1/L2/D-IMC SRAM tier lives in M1-SPM
      (simulator/models/m1_cim_spm.py, SramTier reading sram_metis_aipu), NOT M2. M2 covers
      host DRAM (mem_lpddr4/4x/5) + the CIM-topology PCIe floor (cim_topo_alpha/card). The
      SRAM tier is CACTI/assumption (no published Metis SRAM BW/latency) with
      residency=architecture-only: 8B INT8 weights (~8 GB) >> 32 MiB L2 -> never resident,
      so predict() resolves them to the DRAM tier (the decode wall is host LPDDR, not SRAM)."
  - adr0002_deviation: "ADR-0002 scheduled the Ramulator2 DRAM backend for 'Phase 2'. Phase 1.2
      keeps M2 analytic (MemoryModel(spec, engine='analytic'), swappable per ADR-0002) and moves
      the heavy Ramulator2 backend to PHASE 1.3 (engine='ramulator2', same constructor + frozen
      contract). DEVIATION from ADR-0002's 'Phase 2' wording: heavy DRAM sim now lands in 1.3."
  - ramulator2: "LANDED in Phase 1.3 (engine='ramulator2', LPDDR5 single-stream heavy sim; see adr0002_deviation above); multi-unit contention = Phase 2; PIM-like ext = risk #6"
  - kv_cache_2c: "analytic kv_bytes/BW_eff as a TEMPORARY stand-in (board offline), UNVALIDATED;
      re-calibrate the coefficient when the board is recovered (the form is correct, pure-BW op)"
sample_strategy: "TBD - variance_profile not collected (Phase 0.3 gap)"
