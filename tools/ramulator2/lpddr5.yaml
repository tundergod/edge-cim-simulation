# Ramulator2 LPDDR5-6400 single-stream config (Phase 1.3 target — cross-check the analytic 33.3 GB/s).
# LoadStoreTrace frontend replays a weight-streaming decode trace (LD <addr>, 64B stride); the
# GenericDRAM system reports memory_system_cycles -> effective BW = N*req_bytes / (cycles * tCK_1250ps).
# LPDDR5_6400: tCK=1250ps (800MHz command clock), prefetch 8, x16; LPDDR5_16Gb_x16 org.
#
# ⚠️ OPEN ITEM (2026-06-06): this LPDDR5 config currently aborts with "Failed to send refresh!" under
# saturated streaming (the AllBank refresh manager's priority_send fails when the read queue floods).
# The SAME structure with DRAM impl DDR4 / DDR4_2400R runs clean e2e (ddr4_smoke.yaml: 20000 req,
# 248476 cycles) — so the build is fine; this is a ramulator2/LPDDR5 refresh-config tuning item
# (needs the refresh-vs-saturation interaction resolved). Until fixed, engine='ramulator2' falls back
# to analytic (the plan's position: analytic LPDDR5 is the primary; Ramulator2's signature value is
# the Phase-2 multi-unit contention, not this single-stream number).
Frontend:
  impl: LoadStoreTrace
  path: /tmp/ram2_stream.trace
  clock_ratio: 2
MemorySystem:
  impl: GenericDRAM
  clock_ratio: 3
  DRAM:
    impl: LPDDR5
    org: {preset: LPDDR5_16Gb_x16, channel: 1, rank: 1}
    timing: {preset: LPDDR5_6400}
  Controller:
    impl: Generic
    Scheduler: {impl: FRFCFS}
    RefreshManager: {impl: AllBank}
    RowPolicy: {impl: OpenRowPolicy}
    plugins:
  AddrMapper: {impl: RoBaRaCoCh}
