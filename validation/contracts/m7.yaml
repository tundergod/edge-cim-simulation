module: m7_energy
phase1_scope: spec_based_no_telemetry    # ADR-0005; energy estimated, not measured
measurement_sources:
  - none                                 # no power telemetry on either board (ADR-0005)
acceptance_criteria:
  - {type: sanity, rules: [energy_positive, monotonic_with_activity, order_of_magnitude_vs_spec]}
  - {type: sensitivity, rule: "qualitative conclusion (memory dominates) robust to +/-20% on every coefficient"}
spec_constants:
  - {cim_tops_w: 15.0, source: vendor Metis INT8}
  - {lpddr5_pj_per_bit: 4.0, pcie_pj_per_bit: 5.0, a76_core_w: 0.75}   # assumptions, cited
limitation: "energy ESTIMATED not measured; conclusions must hold under +/-20% (ADR-0005)"
sample_strategy: n/a
