module: m3_event_engine
phase1_scope: contract_only          # behavioral validation = Phase 2 (needs implementation)
measurement_sources:
  - simulator/models/m1_cim_tile.py  # per-op latencies feed the engine
  - simulator/models/m2_memory.py    # shared-bandwidth contention
acceptance_criteria:                 # ADR-0006 Phase-2 SYSTEM thresholds (not per-op)
  - {type: e2e_latency_or_toks, threshold: 15%}
  - {type: contention_trend, tag: simulated}   # memory-wall shape check — SIMULATED (no concurrent-unit silicon; Aetina offline, issue #52), NOT a numeric gate
tunable_params:
  - bandwidth_contention_knee        # shared-BW saturation knee (SIMULATED; no concurrent silicon — Aetina offline; anchored to Ramulator2 multi-stream + Card 4c/1c trend, issue #52)
  - interconnect_efficiency          # shared-BW arbitration (ADR-0002)
  - concurrency_overlap_factor       # CIM || GPU || NPU overlap
note: "Phase 1 defines the contract + tunable params only. M3 is a lightweight discrete-event
  engine (ADR-0001); behavioral validation (toy op-stream timing + a SIMULATED contention-trend
  check — no concurrent-unit silicon, Aetina offline, issue #52) is performed in Phase 2 once
  implemented. The contention knee is a swept assumption anchored to Ramulator2 + the Card 4c/1c
  trend, NOT a reproduced silicon value. Not gated in Phase 1."
