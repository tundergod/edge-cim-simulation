module: m4_cpu
measurement_sources:
  - measurements/aetina/cpu_ops.json
acceptance_criteria:
  - {type: median_op_error, threshold: 10%, scope: softmax linear-in-kv fit}
  - {type: p95_op_error, threshold: 20%, scope: softmax}
  - {type: sanity, rules: [latency_positive, softmax_monotonic_in_kv]}
notes:
  - fp16_is_upper_bound                # numpy-emulated on A76 (provenance: phase0.3-findings)
  - measured_latencies_not_flops       # issue #10
  - const_ops: [rmsnorm, rope_apply, residual, swiglu, sampling_argmax]   # per-(model,dtype) constants
  - prefill_xS_unvalidated             # decode (1-token) costs; prefill x S analytic, unvalidated
sample_strategy: "cov per op from cpu_ops.json (e.g. softmax 0.001-0.005, rmsnorm 0.006-0.012)"
