# Known-good Ramulator2 smoke config (DDR4) — proves the build + LoadStoreTrace + stats pipeline.
# VERIFIED 2026-06-06: ./ramulator2 -f ddr4_smoke.yaml -> 20000 read reqs, 248476 memory_system_cycles.
# (Generate the trace first: python -c "open('/tmp/ram2_stream.trace','w').write(''.join('LD %d\n'%(i*64) for i in range(20000)))")
# The LPDDR5 target (lpddr5.yaml, same structure) currently aborts on refresh under saturation — the
# DDR4 success here isolates that to a ramulator2/LPDDR5 refresh-config item, not a build problem.
Frontend:
  impl: LoadStoreTrace
  path: /tmp/ram2_stream.trace
  clock_ratio: 1
MemorySystem:
  impl: GenericDRAM
  clock_ratio: 4
  DRAM:
    impl: DDR4
    org: {preset: DDR4_8Gb_x8, channel: 1, rank: 2}
    timing: {preset: DDR4_2400R}
  Controller:
    impl: Generic
    Scheduler: {impl: FRFCFS}
    RefreshManager: {impl: AllBank}
    RowPolicy: {impl: ClosedRowPolicy, cap: 4}
    plugins:
  AddrMapper: {impl: RoBaRaCoCh}
